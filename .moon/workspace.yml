$schema: 'https://moonrepo.dev/schemas/workspace.json'

# Explicit id → path map. IDs are clean (no dots); paths keep the on-disk names,
# preserving the Mojo `-I ../sibling` layout invariant.
projects:
  app-ios: 'app/ios'
  app-server: 'app/server'
  app-web: 'app/web'
  browser-native: 'browser-native.mojo'
  csv: 'csv.mojo'
  docx: 'docx.mojo'
  engine: 'engine'
  flare: 'flare'
  jinja2: 'jinja2.mojo'
  json: 'json'
  lancedb: 'lancedb.mojo'
  logging: 'logging.mojo'
  menu-bar: 'menu-bar'
  pdftotext: 'pdftotext.mojo'
  vault: 'vault'
  website: 'website'
  zlib: 'zlib.mojo'
  # Superproject-level orchestration (release pipeline).
  release: 'scripts'

vcs:
  client: 'git'
  defaultBranch: 'main'

# Don't hash build artifacts / tool caches as task inputs (submodule .gitignore
# isn't always read at the superproject level).
hasher:
  ignorePatterns:
    - '**/.build/**'
    - '**/.pixi/**'
    - '**/node_modules/**'
    - '**/dist/**'
    - '**/build/**'
